<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="PPDB Online SMA Kartika Nusantara - Penerimaan Peserta Didik Baru">
    <meta name="keywords" content="PPDB, pendaftaran, sekolah, SMA Kartika">
    <title>PPDB Online - SMA Kartika Nusantara</title>
    <link rel="stylesheet" href="../css/style.css">
    <link rel="preconnect" href="https://cdnjs.cloudflare.com" crossorigin>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        .ppdb-container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }
        .ppdb-header {
            text-align: center;
            margin-bottom: 40px;
        }
        .ppdb-header h1 {
            color: #1e40af;
            margin-bottom: 10px;
        }
        .ppdb-form {
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }
        .form-section {
            margin-bottom: 30px;
        }
        .form-section h3 {
            color: #1e40af;
            margin-bottom: 20px;
            border-bottom: 2px solid #0ea5e9;
            padding-bottom: 10px;
        }
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }
        .form-row.full {
            grid-template-columns: 1fr;
        }
        .form-group {
            display: flex;
            flex-direction: column;
        }
        .form-group label {
            margin-bottom: 8px;
            font-weight: 500;
            color: #1f2937;
        }
        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 1rem;
            font-family: inherit;
            transition: 0.3s ease;
        }
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #1e40af;
            box-shadow: 0 0 0 3px rgba(30, 64, 175, 0.1);
        }
        .form-group textarea {
            resize: vertical;
            min-height: 100px;
        }
        .submit-btn {
            width: 100%;
            padding: 14px;
            background: #0ea5e9;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s ease;
        }
        .submit-btn:hover {
            background: #0284c7;
            transform: translateY(-2px);
        }
        .ppdb-success {
            text-align: center;
            padding: 60px 40px;
            background: #f0fdf4;
            border-radius: 12px;
            border: 2px solid #22c55e;
        }
        .ppdb-success i {
            font-size: 4rem;
            color: #22c55e;
            margin-bottom: 20px;
        }
        .ppdb-success h3 {
            color: #166534;
            margin-bottom: 10px;
            font-size: 1.5rem;
        }
        .ppdb-success p {
            color: #4b5563;
        }
        @media (max-width: 768px) {
            .form-row {
                grid-template-columns: 1fr;
            }
            .ppdb-container {
                margin-top: 100px;
            }
        }
    </style>
</head>
<body>
    <div id="navbar-placeholder"></div>

    <!-- Main Content -->
    <div class="ppdb-container">
        <div class="ppdb-header">
            <h1>PPDB Online</h1>
            <p>Penerimaan Peserta Didik Baru SMA Kartika Nusantara Tahun 2026</p>
        </div>

        <div class="ppdb-form">
            <form id="ppdbForm" novalidate>
                <!-- Data Pribadi -->
                <div class="form-section">
                    <h3><i class="fas fa-user" aria-hidden="true"></i> Data Pribadi</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="fullname">Nama Lengkap <span>*</span></label>
                            <input type="text" id="fullname" name="fullname" required>
                        </div>
                        <div class="form-group">
                            <label for="nisn">NISN <span>*</span></label>
                            <input type="text" id="nisn" name="nisn" required>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="gender">Jenis Kelamin <span>*</span></label>
                            <select id="gender" name="gender" required>
                                <option value="">Pilih Jenis Kelamin</option>
                                <option value="laki-laki">Laki-laki</option>
                                <option value="perempuan">Perempuan</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label for="birthdate">Tanggal Lahir <span>*</span></label>
                            <input type="date" id="birthdate" name="birthdate" required>
                        </div>
                    </div>
                    <div class="form-row full">
                        <div class="form-group">
                            <label for="birthplace">Tempat Lahir <span>*</span></label>
                            <input type="text" id="birthplace" name="birthplace" required>
                        </div>
                    </div>
                </div>

                <!-- Alamat -->
                <div class="form-section">
                    <h3><i class="fas fa-map-marker-alt" aria-hidden="true"></i> Alamat</h3>
                    <div class="form-row full">
                        <div class="form-group">
                            <label for="address">Alamat Lengkap <span>*</span></label>
                            <textarea id="address" name="address" required></textarea>
                        </div>
                    </div>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="province">Provinsi <span>*</span></label>
                            <input type="text" id="province" name="province" required>
                        </div>
                        <div class="form-group">
                            <label for="city">Kota/Kabupaten <span>*</span></label>
                            <input type="text" id="city" name="city" required>
                        </div>
                    </div>
                </div>

                <!-- Kontak -->
                <div class="form-section">
                    <h3><i class="fas fa-phone" aria-hidden="true"></i> Kontak</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="phone">No. Telepon <span>*</span></label>
                            <input type="tel" id="phone" name="phone" required>
                        </div>
                        <div class="form-group">
                            <label for="email">Email <span>*</span></label>
                            <input type="email" id="email" name="email" required>
                        </div>
                    </div>
                </div>

                <!-- Pilihan Program -->
                <div class="form-section">
                    <h3><i class="fas fa-graduation-cap" aria-hidden="true"></i> Pilihan Program</h3>
                    <div class="form-row">
                        <div class="form-group">
                            <label for="program">Program Pilihan <span>*</span></label>
                            <select id="program" name="program" required>
                                <option value="">Pilih Program</option>
                                <option value="ipa">IPA</option>
                                <option value="ips">IPS</option>
                                <option value="rpl">Rekayasa Perangkat Lunak</option>
                                <option value="bahasa">Program Bahasa</option>
                            </select>
                        </div>
                    </div>
                </div>

                <!-- Tombol Submit -->
                <button type="submit" class="submit-btn">Daftar Sekarang</button>
            </form>
        </div>
    </div>

    <div id="footer-placeholder"></div>

    <script src="../js/components.js" defer></script>
    <script src="../js/script.js" defer></script>
    <script>
const ppdbForm = document.getElementById('ppdbForm');
const successContainer = document.createElement('div');
successContainer.className = 'ppdb-success';
successContainer.setAttribute('role', 'alert');
successContainer.setAttribute('aria-live', 'polite');
successContainer.innerHTML = `
    <i class="fas fa-check-circle"></i>
    <h3>Pendaftaran Berhasil!</h3>
    <p>Terima kasih telah mendaftar. Kami akan menghubungi Anda segera melalui email/telepon.</p>
`;

if (ppdbForm) {
    ppdbForm.addEventListener('submit', (e) => {
        e.preventDefault();

        const required = ppdbForm.querySelectorAll('[required]');
        let valid = true;
        required.forEach(field => {
            if (!field.value.trim()) {
                field.style.borderColor = '#dc2626';
                valid = false;
            } else {
                field.style.borderColor = '';
            }
        });
        if (!valid) return;

        ppdbForm.style.display = 'none';
        ppdbForm.parentNode.insertBefore(successContainer, ppdbForm);
    });

    ppdbForm.querySelectorAll('input, select, textarea').forEach(field => {
        field.addEventListener('input', () => { if (field.style.borderColor) field.style.borderColor = ''; });
        field.addEventListener('change', () => { if (field.style.borderColor) field.style.borderColor = ''; });
    });
}
</script>
</body>
</html>
